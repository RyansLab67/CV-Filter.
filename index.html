<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI CV Scanner Pro - Cloud Analytics</title>
  <!-- Library PDF.js yang Benar -->
  <script src="https://cloudflare.com"></script>
  <style>
    :root { --primary: #2563eb; --admin: #b91c1c; --success: #059669; --warning: #d97706; --bg: #f8fafc; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #1e293b; }
    .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
    .hidden { display: none !important; }
    input, button, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: 1px solid #e2e8f0; box-sizing: border-box; font-size: 1em; }
    button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: 700; transition: 0.2s; -webkit-appearance: none; }
    .card { border: 1px solid #e2e8f0; padding: 20px; border-radius: 15px; margin-top: 20px; border-left: 8px solid var(--primary); background: #ffffff; }
    .category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-top: 15px; }
    .cat-item { background: #f8fafc; padding: 12px; border-radius: 8px; border: 1px solid #f1f5f9; text-align: center; }
    .cat-item span { font-size: 0.75rem; color: #64748b; text-transform: uppercase; font-weight: 800; }
    .cat-item b { display: block; font-size: 1.25rem; color: var(--primary); }
    .penalty-box { background: #fff1f2; color: #991b1b; padding: 10px; border-radius: 8px; font-size: 0.85rem; margin-top: 10px; border: 1px solid #fecaca; }
    .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; margin-bottom: 20px; }
  </style>
</head>
<body>

<div class="container">
  <div id="loginSection" style="text-align:center; padding: 40px 0;">
    <h1 style="font-size: 2rem; margin-bottom: 10px;">ATS CV Portal</h1>
    <p style="color: #64748b;">Analisis CV Industri Hospitality</p>
    <input type="text" id="accessKey" placeholder="Paste Kode Akses" style="text-align:center; font-weight:bold;">
    <button onclick="handleLogin()">Masuk Sekarang</button>
  </div>

  <div id="companyPanel" class="hidden">
    <div class="header">
      <h2 style="margin:0">🏢 HRD Dashboard</h2>
      <button onclick="location.reload()" style="background:#64748b; width:auto; padding: 8px 16px;">Logout</button>
    </div>
    <div class="card" style="border-left-color: var(--success)">
      <input type="file" id="cvFiles" multiple accept="application/pdf">
      <button onclick="processCVs()" style="background: var(--success);">Analisis & Ranking CV</button>
    </div>
    <div id="cvResults"></div>
  </div>

  <div id="adminPanel" class="hidden">
    <div class="header">
      <h2 style="color:var(--admin); margin:0;">🔑 Master Control</h2>
      <button onclick="location.reload()" style="background:#64748b; width:auto; padding: 8px 16px;">Logout</button>
    </div>
    <div class="card" style="border-left-color: var(--admin)">
      <input type="text" id="newClient" placeholder="Nama Client">
      <select id="duration">
        <option value="1">1 Bulan</option>
        <option value="12">1 Tahun</option>
      </select>
      <button onclick="generateCloudKey()" style="background:var(--admin)">Simpan ke Cloud</button>
      <div id="keyDisplay" class="hidden" style="margin-top:20px; padding:20px; background:#fef2f2; border:2px dashed var(--admin); text-align:center; border-radius:10px;">
        KUNCI: <code id="finalKey" style="font-size:2rem; font-weight:900; color:var(--admin);"></code>
      </div>
    </div>
  </div>
</div>

<script>
// --- CONFIG ---
const DB_URL = "https://cv-filter-db7bc-default-rtdb.asia-southeast1.firebasedatabase.app/.json"; 
const MASTER_ADMIN = "ADMIN-118JG881J6FGhY";

// Setup Worker PDF.js agar kencang
const pdfjsLib = window['pdfjs-dist/build/pdf'];
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cloudflare.com';

const SKILLS = {
    "Front Office": ["receptionist", "front desk", "opera", "pms", "check-in", "concierge", "vhp", "reservation"],
    "F&B Dept": ["waiter", "waitress", "server", "banquet", "barista", "restaurant", "pos system"],
    "Kitchen": ["chef", "cook", "commis", "culinary", "haccp", "pastry", "bakery", "plating"],
    "Housekeeping": ["cleaning", "room attendant", "laundry", "linen", "turndown", "chemical"],
    "Management": ["manager", "supervisor", "leader", "kpi", "sop", "budgeting"],
    "Soft Skills": ["communication", "teamwork", "problem solving", "english", "hospitality"]
};

async function handleLogin() {
    const key = document.getElementById('accessKey').value.trim();
    if(!key) return alert("Isi kunci!");
    if(key === MASTER_ADMIN) return showPanel('adminPanel');

    try {
        const res = await fetch(DB_URL);
        const data = await res.json();
        if(data && data[key]) {
            if(Date.now() < data[key].expires) return showPanel('companyPanel');
            alert("Kunci Kadaluarsa!");
        } else { alert("Kunci tidak terdaftar!"); }
    } catch (e) { alert("Gagal koneksi database!"); }
}

function showPanel(id) {
    document.getElementById('loginSection').classList.add('hidden');
    document.getElementById(id).classList.remove('hidden');
}

async function generateCloudKey() {
    const name = document.getElementById('newClient').value;
    if(!name) return alert("Nama Client harus diisi!");
    const key = `KEYC-${name.substring(0,3).toUpperCase()}-${Math.random().toString(36).substring(2,8).toUpperCase()}`;
    const expiry = Date.now() + (parseInt(document.getElementById('duration').value) * 30 * 24 * 60 * 60 * 1000);
    const update = {}; update[key] = { client: name, expires: expiry };
    try {
        await fetch(DB_URL, { method: 'PATCH', body: JSON.stringify(update) });
        document.getElementById('keyDisplay').classList.remove('hidden');
        document.getElementById('finalKey').innerText = key;
    } catch (e) { alert("Error database!"); }
}

async function processCVs() {
    const files = document.getElementById('cvFiles').files;
    const output = document.getElementById('cvResults');
    if(files.length === 0) return alert("Pilih file!");
    
    output.innerHTML = "<p id='loadingStatus' style='text-align:center'>⏳ Sedang membedah CV...</p>";

    for (let file of files) {
        try {
            const buffer = await file.arrayBuffer();
            const loadingTask = pdfjsLib.getDocument({data: buffer});
            const pdf = await loadingTask.promise;
            
            let text = "";
            for(let i=1; i<=pdf.numPages; i++){
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                text += content.items.map(s => s.str).join(" ");
            }
            const report = calculateFinalScore(text.toLowerCase());
            renderCV(file.name, report);
        } catch (e) {
            console.error(e);
            output.insertAdjacentHTML('beforeend', `<p style="color:red">Gagal membaca: ${file.name}</p>`);
        }
    }
    const loader = document.getElementById('loadingStatus');
    if(loader) loader.remove();
}

function calculateFinalScore(text) {
    let catScores = {};
    let totalPositive = 0;
    for (let cat in SKILLS) {
        let count = SKILLS[cat].filter(word => text.includes(word.toLowerCase())).length;
        let score = Math.min(100, Math.round((count / 3) * 100));
        catScores[cat] = score;
        totalPositive += score;
    }
    const negatives = ["no experience", "poor", "bad", "lack of"];
    let penalty = 0;
    negatives.forEach(n => { if(text.includes(n)) penalty += 15; });
    return { catScores, final: Math.max(0, Math.round((totalPositive / 6) - penalty)), penalty };
}

function renderCV(name, data) {
    let cats = "";
    for(let c in data.catScores) {
        cats += `<div class="cat-item"><span>${c}</span><b>${data.catScores[c]}%</b></div>`;
    }
    const html = `
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <strong>📄 ${name}</strong>
                <div style="text-align:right">
                    <span style="font-size:1.8rem; font-weight:900; color:${data.final > 70 ? 'var(--success)' : 'var(--warning)'}">${data.final}%</span>
                    <br><small>MATCH SCORE</small>
                </div>
            </div>
            <div class="category-grid">${cats}</div>
            ${data.penalty > 0 ? `<div class="penalty-box">⚠️ Pinalti frasa negatif: -${data.penalty}</div>` : ""}
        </div>`;
    document.getElementById('cvResults').insertAdjacentHTML('afterbegin', html);
}
</script>
</body>
</html>
