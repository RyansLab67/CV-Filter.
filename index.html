<script>

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// PDF worker
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";

// 🔥 MASSIVE HOTEL KEYWORDS
const categories = {
  kitchen: [
    "chef","cook","pastry","bakery","culinary","haccp","food safety",
    "plating","grill","fry","sous chef","commis","butcher","garde manger",
    "menu planning","food production","steward","baking","sauce",
    "kitchen","cooking","recipe","meal prep","knife skills","food hygiene"
  ],

  front_office: [
    "receptionist","front desk","concierge","bellboy","reservation",
    "guest relation","check-in","check-out","lobby","hotel desk",
    "guest handling","customer greeting","booking","pms","opera",
    "guest service agent","front office","telephone operator"
  ],

  housekeeping: [
    "room attendant","laundry","linen","cleaning","housekeeping",
    "sanitation","bed making","vacuum","room cleaning","floor cleaning",
    "janitor","public area","dusting","restroom cleaning","amenities",
    "towel replacement","room inspection"
  ],

  service: [
    "waiter","waitress","server","bartender","barista","mixology",
    "room service","fine dining","buffet","table service","wine",
    "beverage","order taking","hospitality service","tray service",
    "customer service","upselling"
  ],

  engineering: [
    "maintenance","electrical","plumbing","hvac","mechanical",
    "technician","repair","generator","ac repair","wiring",
    "preventive maintenance","facility maintenance"
  ],

  admin: [
    "manager","hr","finance","accounting","payroll","recruitment",
    "training","office","admin","documentation","reporting",
    "human resources","supervisor","operations manager"
  ]
};

// 💀 NEGATIVE WORDS
const negativeWords = [
  "no", "not", "never", "lack", "without", "bad at", "poor", "weak",
  "dont", "don't", "cannot", "can't", "fail", "failed", "inexperienced"
];

// 🧠 SMART ANALYSIS
function analyzeText(text) {
  let scores = {};

  for (let cat in categories) {
    let score = 0;

    categories[cat].forEach(keyword => {
      const regex = new RegExp(`(.{0,20})\\b${keyword}\\b(.{0,20})`, "gi");
      let match;

      while ((match = regex.exec(text)) !== null) {
        const context = match[0].toLowerCase();

        let isNegative = negativeWords.some(neg => context.includes(neg));

        if (isNegative) {
          score -= 2;
        } else {
          score += 1;
        }
      }
    });

    scores[cat] = score;
  }

  return scores;
}

// ANALYZE FUNCTION
async function analyze() {
  const key = document.getElementById("userKey").value;
  const snap = await db.collection("keys").doc(key).get();

  if (!snap.exists || !snap.data().active || Date.now() > snap.data().expire) {
    alert("Invalid or expired key");
    return;
  }

  const files = document.getElementById("files").files;
  let resultHTML = "";

  for (let f of files) {
    const buffer = await f.arrayBuffer();
    const pdf = await pdfjsLib.getDocument(buffer).promise;

    let text = "";
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(s => s.str).join(" ");
    }

    let scores = analyzeText(text);

    resultHTML += `<div class="res"><b>${f.name}</b><br>${JSON.stringify(scores)}</div>`;
  }

  document.getElementById("output").innerHTML = resultHTML;
}

// ADMIN LOGIN
function unlock() {
  if (document.getElementById("adminPass").value === "ADMIN123") {
    document.getElementById("adminPanel").style.display = "block";
    loadKeys();
  } else alert("Wrong admin key");
}

// GENERATE KEY
async function generateKey() {
  const comp = document.getElementById("company").value;
  const months = parseInt(document.getElementById("duration").value);

  const key = "KEY-" + Math.random().toString(36).substring(2,8).toUpperCase();
  const expire = Date.now() + months * 30 * 24 * 60 * 60 * 1000;

  await db.collection("keys").doc(key).set({
    company: comp,
    active: true,
    expire: expire
  });

  alert("Key created: " + key);
  loadKeys();
}

// DEACTIVATE
async function deactivate() {
  const key = document.getElementById("deactivateKey").value;
  await db.collection("keys").doc(key).update({ active: false });
  loadKeys();
}

// LOAD KEYS
async function loadKeys() {
  const snap = await db.collection("keys").get();
  let html = "";

  snap.forEach(doc => {
    const d = doc.data();
    const expired = Date.now() > d.expire;

    html += `<div>
      ${d.company} | ${doc.id} | 
      ${d.active && !expired ? "✅ Active" : "❌ Inactive"}
    </div>`;
  });

  document.getElementById("list").innerHTML = html;
}
                               </script>
