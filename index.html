<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI CV Scanner Pro - Cloud Analytics</title>
  <style>
    :root { --primary: #2563eb; --admin: #b91c1c; --success: #059669; --warning: #d97706; --bg: #f8fafc; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #1e293b; }
    .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
    .hidden { display: none; }
    input, button, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: 1px solid #e2e8f0; box-sizing: border-box; font-size: 1em; }
    button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: 700; transition: 0.2s; }
    button:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .card { border: 1px solid #e2e8f0; padding: 20px; border-radius: 15px; margin-top: 20px; border-left: 8px solid var(--primary); background: #ffffff; }
    .category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-top: 15px; }
    .cat-item { background: #f8fafc; padding: 12px; border-radius: 8px; border: 1px solid #f1f5f9; text-align: center; }
    .cat-item span { font-size: 0.75rem; color: #64748b; text-transform: uppercase; font-weight: 800; }
    .cat-item b { display: block; font-size: 1.25rem; color: var(--primary); }
    .penalty-box { background: #fff1f2; color: #991b1b; padding: 10px; border-radius: 8px; font-size: 0.85rem; margin-top: 10px; border: 1px solid #fecaca; }
    .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; margin-bottom: 20px; }
  </style>
</head>
<body>

<div class="container">
  <!-- 1. PORTAL LOGIN -->
  <div id="loginSection" style="text-align:center; padding: 40px 0;">
    <h1 style="font-size: 2rem; margin-bottom: 10px;">ATS CV Portal</h1>
    <p style="color: #64748b;">Analisis CV dengan Akurasi Industri Hospitality</p>
    <input type="text" id="accessKey" placeholder="Paste Kode Akses Admin atau Company" style="text-align:center; font-weight:bold;">
    <button onclick="handleLogin()" style="max-width: 320px;">Masuk Sekarang</button>
    <div id="debugMessage" style="margin-top: 20px; padding: 10px; background: #f0f9ff; border-radius: 8px; display: none; color: #1e40af; font-size: 0.9rem;"></div>
  </div>

  <!-- 2. COMPANY PANEL -->
  <div id="companyPanel" class="hidden">
    <div class="header">
      <h2 style="margin:0">🏢 HRD Dashboard</h2>
      <button onclick="location.reload()" style="background:#64748b; width:auto; padding: 8px 16px;">Logout</button>
    </div>
    <div class="card" style="border-left-color: var(--success)">
      <p style="margin-top:0">Upload PDF CV pelamar untuk melihat <b>Scoring Analysis</b>.</p>
      <input type="file" id="cvFiles" multiple accept="application/pdf">
      <button onclick="processCVs()" style="background: var(--success);">Analisis & Ranking CV</button>
    </div>
    <div id="cvResults"></div>
  </div>

  <!-- 3. ADMIN PANEL -->
  <div id="adminPanel" class="hidden">
    <div class="header">
      <h2 style="color:var(--admin); margin:0;">🔑 Master Control</h2>
      <button onclick="location.reload()" style="background:#64748b; width:auto; padding: 8px 16px;">Logout</button>
    </div>
    <div class="card" style="border-left-color: var(--admin)">
      <h3>Generate Company Access</h3>
      <input type="text" id="newClient" placeholder="Nama Client (Misal: Hotel Hilton)">
      <select id="duration">
        <option value="1">Akses 1 Bulan (+30 Hari)</option>
        <option value="3">Akses 3 Bulan (+90 Hari)</option>
        <option value="12">Akses 1 Tahun (+365 Hari)</option>
      </select>
      <button onclick="generateCloudKey()" style="background:var(--admin)">Simpan ke Cloud Database</button>
      <div id="keyDisplay" class="hidden" style="margin-top:20px; padding:20px; background:#fef2f2; border:2px dashed var(--admin); text-align:center; border-radius:10px;">
        <p style="margin:0; color:#991b1b; font-weight:bold;">KUNCI BERHASIL DIBUAT:</p>
        <code id="finalKey" style="font-size:2rem; font-weight:900; color:var(--admin); display:block; margin:10px 0;"></code>
        <small>Berikan kunci ini ke klien Anda.</small>
      </div>
    </div>
  </div>
</div>

<!-- Library PDF.js untuk membaca file PDF - FIXED CDN URL -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
// Konfigurasi Worker PDF.js
if (typeof pdfjsLib !== 'undefined') {
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    console.log("✓ PDF.js library loaded successfully");
} else {
    console.error("✗ PDF.js library failed to load");
}

// --- DATABASE CONFIG ---
const DB_URL = "https://cvfilter-2604b-default-rtdb.asia-southeast1.firebasedatabase.app/.json"
const MASTER_ADMIN = "ADMIN-118JG881J6FGhY";

const SKILLS = {
    "Front Office": ["receptionist", "front desk", "opera", "pms", "check-in", "concierge", "vhp", "reservation", "night audit", "handling complaint", "telephone operator"],
    "F&B Dept": ["waiter", "waitress", "server", "banquet", "barista", "restaurant", "fine dining", "order taker", "table setup", "mixology", "pos system", "food safety"],
    "Kitchen": ["chef", "cook", "commis", "culinary", "haccp", "pastry", "bakery", "food production", "mise en place", "plating", "butcher", "steward"],
    "Housekeeping": ["cleaning", "room attendant", "laundry", "linen", "turndown", "chemical", "public area", "sanitizing", "vacuum", "bed making"],
    "Management": ["manager", "supervisor", "leader", "kpi", "scheduling", "inventory", "budgeting", "reporting", "cost control", "sop", "coordinator"],
    "Soft Skills": ["communication", "teamwork", "problem solving", "english", "hospitality", "flexible", "multitasking", "organized", "customer oriented"]
};

// --- LOGIN LOGIC - IMPROVED WITH ERROR HANDLING ---
async function handleLogin() {
    const key = document.getElementById('accessKey').value.trim();
    const debugMsg = document.getElementById('debugMessage');
    
    console.log("🔍 Login attempt with key:", key);
    
    if (!key) {
        showDebug("⚠️ Masukkan kode akses!");
        alert("Masukkan kode akses terlebih dahulu!");
        return;
    }
    
    // Check master admin key
    if (key === MASTER_ADMIN) {
        console.log("✓ Master admin detected!");
        showDebug("✓ Admin access granted");
        return showPanel('adminPanel');
    }

    try {
        console.log("📡 Attempting Firebase connection...");
        showDebug("📡 Menghubungkan ke database...");
        
        const res = await fetch(DB_URL);
        console.log("Response status:", res.status);
        
        if (!res.ok) {
            throw new Error(`HTTP Error: ${res.status}`);
        }
        
        const data = await res.json();
        console.log("Database response received");
        
        if (data && data[key]) {
            console.log("Key found in database");
            const expiryTime = data[key].expires;
            const currentTime = Date.now();
            
            console.log("Expiry time:", new Date(expiryTime), "Current time:", new Date(currentTime));
            
            if (currentTime < expiryTime) {
                console.log("✓ Key is valid and not expired");
                showDebug("✓ Kunci valid - akses diberikan");
                return showPanel('companyPanel');
            } else {
                console.log("✗ Key has expired");
                showDebug("✗ Kunci kadaluarsa");
                alert("Kunci Kadaluarsa! Hubungi admin untuk perpanjangan.");
            }
        } else {
            console.log("✗ Key not found in database");
            showDebug("✗ Kunci tidak terdaftar");
            alert("Kunci tidak terdaftar! Periksa kembali atau hubungi admin.");
        }
    } catch (e) {
        console.error("Login error:", e);
        showDebug(`✗ Error: ${e.message}`);
        alert(`Gagal koneksi database!\n\nError: ${e.message}\n\nCek browser console (F12) untuk detail lengkap.`);
    }
}

function showDebug(msg) {
    const debugMsg = document.getElementById('debugMessage');
    debugMsg.innerText = msg;
    debugMsg.style.display = 'block';
}

function showPanel(id) {
    document.getElementById('loginSection').classList.add('hidden');
    document.getElementById(id).classList.remove('hidden');
}

// --- ADMIN LOGIC ---
async function generateCloudKey() {
    const name = document.getElementById('newClient').value;
    const months = parseInt(document.getElementById('duration').value);
    
    console.log("Generating key for:", name, "Duration:", months, "months");
    
    if (!name) {
        alert("Nama Client harus diisi!");
        return;
    }

    const key = `KEYC-${name.substring(0,3).toUpperCase()}-${Math.random().toString(36).substring(2,8).toUpperCase()}`;
    const expiry = Date.now() + (months * 30 * 24 * 60 * 60 * 1000);

    console.log("Generated key:", key, "Expires:", new Date(expiry));

    const update = {};
    update[key] = { client: name, expires: expiry };
    
    try {
        console.log("Sending to Firebase...");
        const res = await fetch(DB_URL, { 
            method: 'PATCH', 
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(update) 
        });
        
        if (!res.ok) {
            throw new Error(`HTTP Error: ${res.status}`);
        }
        
        console.log("✓ Key saved to Firebase successfully");
        document.getElementById('keyDisplay').classList.remove('hidden');
        document.getElementById('finalKey').innerText = key;
        alert("Kunci berhasil disimpan!");
    } catch (e) {
        console.error("Database error:", e);
        alert(`Gagal menyimpan ke database!\n\nError: ${e.message}`);
    }
}

// --- SCANNING & SCORING LOGIC ---
async function processCVs() {
    const files = document.getElementById('cvFiles').files;
    const output = document.getElementById('cvResults');
    
    if (files.length === 0) {
        alert("Pilih file CV terlebih dahulu!");
        return;
    }
    
    if (typeof pdfjsLib === 'undefined') {
        alert("PDF.js library belum siap. Refresh halaman dan coba lagi.");
        return;
    }
    
    output.innerHTML = "<p style='text-align:center'>⏳ Membedah struktur CV & mendeteksi skill...</p>";
    console.log("Processing", files.length, "CV file(s)");

    for (let file of files) {
        try {
            console.log("Processing file:", file.name);
            const buffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data: buffer}).promise;
            let text = "";
            
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                text += content.items.map(s => s.str).join(" ");
            }
            text = text.toLowerCase();
            
            const report = calculateFinalScore(text);
            renderCV(file.name, report);
            console.log("✓ Processed:", file.name, "Score:", report.final);
        } catch (err) {
            console.error("Error processing", file.name, ":", err);
            output.innerHTML += `<div class="card" style="border-left-color: var(--warning)"><strong>❌ ${file.name}</strong><p>Gagal memproses file. ${err.message}</p></div>`;
        }
    }
    if (output.innerHTML.includes("⏳")) {
        output.innerHTML = "";
    }
}

function calculateFinalScore(text) {
    let catScores = {};
    let totalPositive = 0;
    
    for (let cat in SKILLS) {
        let count = SKILLS[cat].filter(word => text.includes(word)).length;
        let score = Math.min(100, Math.round((count / 3) * 100));
        catScores[cat] = score;
        totalPositive += score;
    }
    
    const negatives = ["no experience", "poor at", "bad", "not good", "struggle with", "lack of", "never worked"];
    let penalty = 0;
    negatives.forEach(n => { 
        if (text.includes(n)) {
            penalty += 15;
            console.log("Penalty detected:", n);
        }
    });
    
    let final = Math.max(0, Math.round((totalPositive / 6) - penalty));
    return { catScores, final, penalty };
}

function renderCV(name, data) {
    let cats = "";
    for (let c in data.catScores) {
        cats += `<div class="cat-item"><span>${c}</span><b>${data.catScores[c]}%</b></div>`;
    }
    document.getElementById('cvResults').innerHTML += `
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <strong>📄 ${name}</strong>
                <div style="text-align:right">
                    <span style="font-size:1.8rem; font-weight:900; color:${data.final > 70 ? 'var(--success)' : 'var(--warning)'}">${data.final}%</span>
                    <br><small>MATCH SCORE</small>
                </div>
            </div>
            <div class="category-grid">${cats}</div>
            ${data.penalty > 0 ? `<div class="penalty-box">⚠️ Terdeteksi frasa negatif (Pinalti: -${data.penalty} poin)</div>` : ""}
        </div>`;
}

// Log application startup
console.log("ATS CV Portal initialized. Master Admin Key: " + MASTER_ADMIN);
console.log("Database URL:", DB_URL);
</script>
</body>
</html>
