<!DOCTYPE html>
<html>
<head>
  <title>CV Analyzer</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 20px;
    }

    h2 {
      margin-top: 30px;
    }

    input, select, button {
      padding: 12px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    input, select {
      width: 250px;
    }

    button {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

    #output {
      margin-top: 20px;
    }

    #adminPanel {
      background: rgba(255,255,255,0.08);
      padding: 20px;
      border-radius: 15px;
      margin-top: 20px;
    }
  </style>

</head>
  

<body>

<h1>CV Analyzer</h1>

<input type="text" id="userKey" placeholder="Enter company key">
<input type="file" id="files" multiple>
<button onclick="analyze()">Analyze CV</button>

<div id="output"></div>

<hr>

<h2>Admin Panel</h2>
<input type="password" id="adminPass" placeholder="Admin password">
<button onclick="unlock()">Unlock</button>

<div id="adminPanel" style="display:none;">
  <input type="text" id="company" placeholder="Company name">

  <select id="duration">
    <option value="1">1 Month</option>
    <option value="3">3 Months</option>
    <option value="6">6 Months</option>
    <option value="12">12 Months</option>
  </select>

  <button onclick="generateKey()">Generate Key</button>

  <br><br>

  <input type="text" id="deactivateKey" placeholder="Key to deactivate">
  <button onclick="deactivate()">Deactivate</button>

  <h3>All Keys</h3>
  <div id="list"></div>
</div>

<!-- LIBRARIES -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
window.onerror = function(msg, url, line) {
  alert("Error: " + msg + " at line " + line);
};

const firebaseConfig = {
  apiKey: "AIzaSyBhiVoMzpFyuLznahsq_J1Cs6g8sBVPhPk",
  authDomain: "cv-analyzer-b6914.firebaseapp.com",
  projectId: "cv-analyzer-b6914",
  storageBucket: "cv-analyzer-b6914.firebasestorage.app",
  messagingSenderId: "504659232250",
  appId: "1:504659232250:web:2c4324c1c83fb1bc8e5043"
};

window.addEventListener("load", () => {

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";

  const categories = {
    kitchen: ["chef","cook","pastry","bakery","culinary","haccp","food safety","plating","grill","fry","sous chef","commis","butcher","garde manger","menu planning","food production","steward","baking","sauce","kitchen","cooking","recipe","meal prep","knife skills","food hygiene"],
    front_office: ["receptionist","front desk","concierge","bellboy","reservation","guest relation","check-in","check-out","lobby","hotel desk","guest handling","customer greeting","booking","pms","opera","guest service agent","front office","telephone operator"],
    housekeeping: ["room attendant","laundry","linen","cleaning","housekeeping","sanitation","bed making","vacuum","room cleaning","floor cleaning","janitor","public area","dusting","restroom cleaning","amenities","towel replacement","room inspection"],
    service: ["waiter","waitress","server","bartender","barista","mixology","room service","fine dining","buffet","table service","wine","beverage","order taking","hospitality service","tray service","customer service","upselling"],
    engineering: ["maintenance","electrical","plumbing","hvac","mechanical","technician","repair","generator","ac repair","wiring","preventive maintenance","facility maintenance"],
    admin: ["manager","hr","finance","accounting","payroll","recruitment","training","office","admin","documentation","reporting","human resources","supervisor","operations manager"]
  };

  const negativeWords = ["no","not","never","lack","without","bad at","poor","weak","dont","don't","cannot","can't","fail","failed","inexperienced"];

  function analyzeText(text) {
    let scores = {};

    for (let cat in categories) {
      let score = 0;

      categories[cat].forEach(keyword => {
        const regex = new RegExp(`(.{0,20})\\b${keyword}\\b(.{0,20})`, "gi");
        let match;

        while ((match = regex.exec(text)) !== null) {
          const context = match[0].toLowerCase();
          let isNegative = negativeWords.some(neg => context.includes(neg));

          score += isNegative ? -2 : 1;
        }
      });

      scores[cat] = score;
    }

    return scores;
  }

  window.analyze = async function() {
    const key = document.getElementById("userKey").value;
    const snap = await db.collection("keys").doc(key).get();

    if (!snap.exists || !snap.data().active || Date.now() > snap.data().expire) {
      alert("Invalid or expired key");
      return;
    }

    const files = document.getElementById("files").files;
    let resultHTML = "";

    for (let f of files) {
      const buffer = await f.arrayBuffer();
      const pdf = await pdfjsLib.getDocument(buffer).promise;

      let text = "";
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        text += content.items.map(s => s.str).join(" ");
      }

      let scores = analyzeText(text);
      resultHTML += `<div><b>${f.name}</b><br>${JSON.stringify(scores)}</div>`;
    }

    document.getElementById("output").innerHTML = resultHTML;
  };

  window.unlock = function() {
    if (document.getElementById("adminPass").value === "ADMIN123") {
      document.getElementById("adminPanel").style.display = "block";
      loadKeys();
    } else alert("Wrong admin key");
  };

  async function loadKeys() {
    const snap = await db.collection("keys").get();
    let html = "";

    snap.forEach(doc => {
      const d = doc.data();
      const expired = Date.now() > d.expire;

      html += `<div>${d.company} | ${doc.id} | ${d.active && !expired ? "Active" : "Inactive"}</div>`;
    });

    document.getElementById("list").innerHTML = html;
  }

  window.generateKey = async function() {
    const comp = document.getElementById("company").value;
    const months = parseInt(document.getElementById("duration").value);

    const key = "KEY-" + Math.random().toString(36).substring(2,8).toUpperCase();
    const expire = Date.now() + months * 30 * 24 * 60 * 60 * 1000;

    await db.collection("keys").doc(key).set({
      company: comp,
      active: true,
      expire: expire
    });

    alert("Key created: " + key);
    loadKeys();
  };

  window.deactivate = async function() {
    const key = document.getElementById("deactivateKey").value;
    await db.collection("keys").doc(key).update({ active: false });
    loadKeys();
  };

});
</script>

</body>
  </html>
